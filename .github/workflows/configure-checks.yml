name: Configure Checks
on: [push, pull_request]
permissions: {}
jobs:
  sanitizers:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        sanitizer: [asan, lsan, tsan, ubsan]
      fail-fast: false
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
      - name: Test --enable-${{ matrix.sanitizer }}
        run: |
          ./autogen.sh
          ./configure --enable-${{ matrix.sanitizer }} CC=clang
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.sanitizer }}-config.log
          path: config.log
